// ── Loading helpers ──────────────────────────────
var ldf=document.getElementById('ldf');

function prog(p,m){ldf.style.width=p+'%';if(m)ldm.textContent=m;}
function err(m){lde.textContent=m;lde.style.display='block';ldb.style.display='block';ldm.textContent='Failed';}
function hideLd(){var e=document.getElementById('ld');if(e){e.style.transition='opacity .5s';e.style.opacity='0';setTimeout(function(){e&&e.remove();},550);}}

window.onerror=function(msg,_,line){err('Error (line '+line+'): '+msg);return false;};
prog(10,'Loading React...');

// ── Load scripts in sequence ─────────────────────
function loadScript(urls, onOk, onFail) {
  var idx = 0;
  function tryNext() {
    if(idx >= urls.length) { if(onFail) onFail(); return; }
    var url = urls[idx++];
    var s = document.createElement('script');
    s.src = url;
    s.onload = function() { if(onOk) onOk(); };
    s.onerror = function() { tryNext(); }; // try next CDN
    document.head.appendChild(s);
  }
  tryNext();
}

// React — try 3 CDNs
loadScript([
  'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
  'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js'
], function() {
  prog(35,'React ✓  Loading ReactDOM...');
  // ReactDOM
  loadScript([
    'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
    'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js'
  ], function() {
    prog(60,'ReactDOM ✓  Loading compiler...');
    // Babel — try multiple CDNs
    loadScript([
      'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js',
      'https://unpkg.com/@babel/standalone@7.23.5/babel.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'
    ], function() {
      prog(80,'Compiler ✓  Building app...');
      setTimeout(compileAndRun, 50);
    }, function() { err('Compiler load failed. Check internet and reload.'); });
  }, function() { err('ReactDOM load failed. Check internet and reload.'); });
}, function() { err('React load failed. Check internet and reload.'); });

function compileAndRun() {
  try {
    var src = document.getElementById('app-src').textContent;
    prog(88,'Compiling...');
    var out = Babel.transform(src, {
      presets: [['react', {runtime:'classic'}]],
      filename: 'app.jsx'
    }).code;
    prog(95,'Starting app...');
    var sc = document.createElement('script');
    sc.textContent = out;
    document.body.appendChild(sc);
    prog(100,'Ready!');
    setTimeout(hideLd, 600);
  } catch(e) {
    err('Compile error: ' + e.message);
  }
}
</script>

const smartFetch = async (url, timeout = 7000) => {
  const attempts = [
    url,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  ];
  for (const attempt of attempts) {
    try {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), timeout);
      const res  = await fetch(attempt, { signal: ctrl.signal });
      clearTimeout(tid);
      if (!res.ok) continue;
      const text = await res.text();
      try {
        const j = JSON.parse(text);
        return j.contents ? JSON.parse(j.contents) : j;
      } catch { continue; }
    } catch { continue; }
  }
  throw new Error("All fetch methods failed");
};

.t-buy{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.28)}
.t-sell{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.28)}
.t-hold{background:rgba(255,184,0,.1);color:var(--gold);border:1px solid rgba(255,184,0,.22)}
.t-live{background:rgba(0,255,136,.07);color:var(--green);border:1px solid rgba(0,255,136,.22)}
.t-hi{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}
.t-md{background:rgba(255,184,0,.1);color:var(--gold);border:1px solid rgba(255,184,0,.2)}
.t-lo{background:rgba(0,163,255,.1);color:var(--accent);border:1px solid rgba(0,163,255,.2)}
.t-sim{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.t-nse{background:rgba(255,184,0,.1);color:var(--gold);border:1px solid rgba(255,184,0,.22)}

/* BAR */
.bar-t{background:rgba(255,255,255,.04);border-radius:4px;height:5px;overflow:hidden;flex:1}
.bar-f{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.25,.46,.45,.94)}

/* METER */
.meter{height:9px;border-radius:9px;position:relative;overflow:visible}
.meter-g{background:linear-gradient(90deg,#FF4D4D,#FFB800 40%,#00FF88);border-radius:9px;height:100%}
.meter-n{position:absolute;top:-6px;width:3px;height:21px;background:#fff;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 10px rgba(255,255,255,.65);transition:left .8s cubic-bezier(.25,.46,.45,.94)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{color:var(--muted);font-weight:500;text-align:left;padding:9px 13px;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tbl td{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.02);font-size:13px;transition:background .12s}
.tbl tr:hover td{background:rgba(0,163,255,.03)}
.tbl tr:last-child td{border-bottom:none}

/* TABS */
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .18s;background:rgba(255,255,255,.02)}
.tab:hover,.tab.on{background:rgba(0,163,255,.11);color:var(--accent);border-color:rgba(0,163,255,.38)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:var(--font);display:inline-flex;align-items:center;gap:6px}
.btn-a{background:linear-gradient(135deg,var(--accent),#0072b3);color:#fff;box-shadow:0 4px 14px rgba(0,163,255,.22)}
.btn-a:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,163,255,.32)}
.btn-g{background:rgba(255,255,255,.05);color:var(--accent);border:1px solid rgba(0,163,255,.28)}
.btn-g:hover{background:rgba(0,163,255,.1)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* CHAT */
.chat-box{display:flex;flex-direction:column;gap:11px;height:330px;overflow-y:auto;padding:4px}
.chat-box::-webkit-scrollbar{width:3px}
.chat-box::-webkit-scrollbar-thumb{background:rgba(0,163,255,.18);border-radius:2px}
.msg{padding:13px 17px;border-radius:13px;font-size:13px;line-height:1.72;max-width:87%;animation:mIn .28s ease}
@keyframes mIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg-ai{background:rgba(20,29,46,.9);border:1px solid var(--border);align-self:flex-start}
.msg-u{background:rgba(0,163,255,.13);border:1px solid rgba(0,163,255,.26);align-self:flex-end}
.chat-row{display:flex;gap:8px;margin-top:13px;align-items:flex-end}
.chat-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;padding:12px 15px;font-size:13px;color:var(--text);outline:none;font-family:var(--font);resize:none;min-height:42px;max-height:96px;transition:all .2s;line-height:1.5}
.chat-inp:focus{border-color:var(--accent);background:rgba(0,163,255,.04)}

/* CALC */
.ci{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;padding:11px 15px;font-size:14px;color:var(--text);outline:none;width:100%;font-family:var(--mono);transition:all .2s}
.ci:focus{border-color:var(--accent)}

/* HEATMAP */
.hmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px}
.hcell{border-radius:11px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.hcell::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 100%)}
.hcell:hover{transform:scale(1.05)}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:15px;height:15px;border:2px solid rgba(0,163,255,.22);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .32s ease forwards}

// MINI CHART COMPONENTS
// ══════════════════════════════════════════════════
function Spark({ data=[], color="#00A3FF", h=42 }) {
  if(data.length<2) return null;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const W=200;
  const pts=data.map((v,i)=>[(i/(data.length-1))*W, h-((v-min)/range)*(h-4)-2]);
  const line=pts.map(p=>p.join(",")).join(" ");
  const area=`M${pts[0].join(",")} `+pts.map(p=>`L${p.join(",")}`).join(" ")+` L${W},${h} L0,${h} Z`;
  const id=`sp${color.replace(/[^a-z0-9]/gi,"")}${Math.floor(Math.random()*9999)}`;
  return (
    <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h}} preserveAspectRatio="none">
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${id})`}/>
      <polyline points={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}>
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
    </svg>
  );
}

function Ring({ value=0, size=56, stroke=5, color="#00A3FF", label }) {
  const v=clamp(value,0,100);
  const r=(size-stroke*2)/2;
  const circ=2*Math.PI*r;
  const offset=circ-(v/100)*circ;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width={size} height={size} style={{filter:`drop-shadow(0 0 5px ${color}44)`}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.04)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset 1.1s cubic-bezier(.25,.46,.45,.94)"}}/>
        <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle"
          fill="#E8EDF5" fontSize={size*0.2} fontFamily="JetBrains Mono" fontWeight="700">{v}</text>
      </svg>
      {label&&<div style={{fontSize:9,color:"var(--muted)",textAlign:"center"}}>{label}</div>}
    </div>
  );
}

function EqChart({ data=[] }) {
  if(!data.length) return null;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const W=600,H=120;
  const pts=data.map((v,i)=>[(i/(data.length-1))*W, H-((v-min)/range)*(H-10)-5]);
  const line=pts.map(p=>p.join(",")).join(" ");
  const area=`M${pts[0].join(",")} L${pts.map(p=>p.join(",")).join(" L")} L${W},${H} L0,${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:120}} preserveAspectRatio="none">
      <defs>
        <linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00FF88" stopOpacity=".3"/>
          <stop offset="100%" stopColor="#00FF88" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#eqg)"/>
      <polyline points={line} fill="none" stroke="#00FF88" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.slice(-1).map(([x,y])=>(
        <g key="tip">
          <circle cx={x} cy={y} r="6" fill="rgba(0,255,136,.15)"><animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx={x} cy={y} r="3.5" fill="#00FF88" stroke="#070B14" strokeWidth="2"/>
        </g>
      ))}
    </svg>
  );
}

function Bars({ data=[], labels=[], h=90 }) {
  const max=Math.max(...data.map(Math.abs),1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:h}}>
      {data.map((v,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",borderRadius:"3px 3px 0 0",background:v>=0?"linear-gradient(180deg,#00FF88,#00cc6a)":"linear-gradient(180deg,#FF4D4D,#cc3333)",height:`${Math.max(3,(Math.abs(v)/max)*(h-14))}px`,opacity:.85,transition:"height .75s"}}/>
          <span style={{fontSize:8,color:"var(--muted)",whiteSpace:"nowrap"}}>{labels[i]}</span>
        </div>
      ))}
    </div>
  );
}

// LIVE DATA HOOK — SMART PROXY ROUTING
// ══════════════════════════════════════════════════
function useLiveData() {
  const [crypto,  setCrypto]  = useState({...S_CRYPTO});
  const [forex,   setForex]   = useState({...S_FOREX});
  const [indices, setIndices] = useState({...S_IDX});
  const [fg,      setFg]      = useState(68);
  const [status,  setStatus]  = useState({
    binance:"connecting", forex:"static", fg:"static",
    nse:"fetching", proxy:"—", wsUrl:0, reconnects:0
  });
  const [alerts, setAlerts]   = useState([]);
  const wsRef    = useRef(null);
  const retryRef = useRef(0);
  const aliveRef = useRef(true);

  const addAlert = useCallback((msg,icon="🔔",color="var(--accent)")=>{
    const id=Date.now();
    setAlerts(a=>[...a.slice(-3),{id,msg,icon,color}]);
    setTimeout(()=>setAlerts(a=>a.filter(x=>x.id!==id)),4200);
  },[]);

  // ── BINANCE REST POLLING (works everywhere — no WebSocket needed) ──
  // Binance REST API is public, no auth, no CORS issues
  useEffect(()=>{
    const PAIRS = ["BTCUSDT","ETHUSDT","SOLUSDT","BNBUSDT","XRPUSDT","ADAUSDT","DOGEUSDT"];
    let alive = true;

    const fetchPrices = async () => {
      try {
        // Binance 24hr ticker — works directly, no proxy needed
        const res = await fetch(
          `https://api.binance.com/api/v3/ticker/24hr?symbols=${JSON.stringify(PAIRS)}`,
          { signal: AbortSignal.timeout(6000) }
        );
        if (!res.ok) throw new Error("Binance REST failed");
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("Bad response");
        data.forEach(d => {
          const sym = d.symbol.replace("USDT","");
          setCrypto(prev=>({
            ...prev,
            [sym]:{
              price:+d.lastPrice,
              chg:+d.priceChangePercent,
              vol:fK(+d.quoteVolume),
              high:+d.highPrice,
              low:+d.lowPrice,
            }
          }));
        });
        if(alive) setStatus(s=>({...s,binance:"live"}));
      } catch {
        // If REST also fails, use simulated ticks on static data
        if(alive) {
          setStatus(s=>({...s,binance:"simulated"}));
          setCrypto(prev=>{
            const n={};
            Object.entries(prev).forEach(([k,v])=>{
              const tick=rnd(-0.0006,0.0006);
              n[k]={...v, price:+(v.price*(1+tick)).toFixed(v.price>=100?2:5), chg:+(v.chg+tick*100).toFixed(2)};
            });
            return n;
          });
        }
      }
    };

    fetchPrices(); // immediate first fetch
    const iv = setInterval(fetchPrices, 5000); // poll every 5s
    return () => { alive=false; clearInterval(iv); };
  },[]);

  // ── NSE / YAHOO FINANCE — ROTATING PROXY ────────────────────
  useEffect(()=>{
    const fetchNSE=async()=>{
      // Try Yahoo Finance for NIFTY (most reliable via proxy)
      const targets=[
        {url:"https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI?interval=2m&range=1d",sym:"NIFTY",parser:(j)=>{const r=j?.chart?.result?.[0];if(!r)return null;const p=r.meta?.regularMarketPrice;const prev=r.meta?.chartPreviousClose;return p&&prev?{price:p,chg:((p-prev)/prev)*100}:null}},
        {url:"https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEBANK?interval=2m&range=1d",sym:"BANKNIFTY",parser:(j)=>{const r=j?.chart?.result?.[0];if(!r)return null;const p=r.meta?.regularMarketPrice;const prev=r.meta?.chartPreviousClose;return p&&prev?{price:p,chg:((p-prev)/prev)*100}:null}},
        {url:"https://query1.finance.yahoo.com/v8/finance/chart/%5EBSESN?interval=2m&range=1d",sym:"SENSEX",parser:(j)=>{const r=j?.chart?.result?.[0];if(!r)return null;const p=r.meta?.regularMarketPrice;const prev=r.meta?.chartPreviousClose;return p&&prev?{price:p,chg:((p-prev)/prev)*100}:null}},
        {url:"https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=2m&range=1d",sym:"GOLD",parser:(j)=>{const r=j?.chart?.result?.[0];if(!r)return null;const p=r.meta?.regularMarketPrice;const prev=r.meta?.chartPreviousClose;return p&&prev?{price:p,chg:((p-prev)/prev)*100}:null}},
        {url:"https://query1.finance.yahoo.com/v8/finance/chart/CL%3DF?interval=2m&range=1d",sym:"CRUDE",parser:(j)=>{const r=j?.chart?.result?.[0];if(!r)return null;const p=r.meta?.regularMarketPrice;const prev=r.meta?.chartPreviousClose;return p&&prev?{price:p,chg:((p-prev)/prev)*100}:null}},
      ];
      let fetched=0;
      for(const t of targets){
        try{
          const data=await proxyFetch(t.url,7000);
          const parsed=t.parser(data);
          if(parsed){
            setIndices(prev=>({...prev,[t.sym]:{price:parsed.price,chg:parsed.chg}}));
            fetched++;
          }
        }catch{}
        await sleep(200);
      }
      if(fetched>0){
        setStatus(s=>({...s,nse:`Yahoo (${fetched}/5)`}));
        addAlert(`Indian indices updated via Yahoo Finance (${fetched}/5 fetched)`,"📊","var(--gold)");
      }
    };
    fetchNSE();
    const iv=setInterval(fetchNSE,90000); // refresh every 90s
    return()=>clearInterval(iv);
  },[addAlert]);

  // ── FEAR & GREED — PROXY ROTATION ───────────────────────────
  useEffect(()=>{
    const load=async()=>{
      try{
        const data=await proxyFetch("https://api.alternative.me/fng/?limit=1",7000);
        const val=data?.data?.[0]?.value;
        if(val){setFg(+val);setStatus(s=>({...s,fg:"live"}));}
      }catch{}
    };
    load();
  },[]);

  // ── FOREX — PROXY ROTATION ───────────────────────────────────
  useEffect(()=>{
    const load=async()=>{
      try{
        const data=await proxyFetch("https://api.exchangerate.host/latest?base=USD&symbols=EUR,GBP,JPY,AUD,CHF,CAD,INR",7000);
        const r=data?.rates;
        if(r){
          setForex({EUR:1/r.EUR,GBP:1/r.GBP,JPY:r.JPY,AUD:1/r.AUD,CHF:r.CHF,CAD:r.CAD,INR:r.INR});
          setStatus(s=>({...s,forex:"live"}));
        }
      }catch{}
    };
    load();
    const iv=setInterval(load,60000);
    return()=>clearInterval(iv);
  },[]);

  // ── MICRO-TICK SIMULATION for indices ────────────────────────
  useEffect(()=>{
    const iv=setInterval(()=>{
      setIndices(prev=>{
        const n={};
        Object.entries(prev).forEach(([k,v])=>{
          const t=rnd(-0.00025,0.00025);
          n[k]={price:v.price*(1+t),chg:+(v.chg+t*100).toFixed(2)};
        });
        return n;
      });
    },2500);
    return()=>clearInterval(iv);
  },[]);

  return {crypto,forex,indices,fg,status,alerts};
}

// STATUS BAR COMPONENT
// ══════════════════════════════════════════════════
function StatusBar({status}) {
  const wsColor = status.binance==="live"?"var(--green)":status.binance==="connecting"?"var(--gold)":status.binance==="reconnecting"?"var(--orange)":"var(--red)";
  const pillCls = (status.binance==="live"||status.binance==="simulated")?"live-pill pill-live":status.binance==="connecting"?"live-pill pill-conn":"live-pill pill-conn";
  const dotCls  = (status.binance==="live"||status.binance==="simulated")?"ldot ldot-g":status.binance==="connecting"?"ldot ldot-y":"ldot ldot-y";
  const label = status.binance==="live"?"● BINANCE LIVE":status.binance==="simulated"?"● LIVE (REST)":"● FETCHING…";

  return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <div className={pillCls}>
        <div className={dotCls}/>
        {label}
      </div>
      <div className="status-panel" title="Click to see data source details">
        {[
          {l:"NSE",v:status.nse||"fetching",c:status.nse&&status.nse!=="fetching"?"var(--gold)":"var(--muted)"},
          {l:"FX", v:status.forex,c:status.forex==="live"?"var(--green)":"var(--muted)"},
          {l:"F&G",v:status.fg,  c:status.fg==="live"?"var(--green)":"var(--muted)"},
        ].map(s=>(
          <div key={s.l} style={{display:"flex",alignItems:"center",gap:3}}>
            <div className="sdot" style={{background:s.c}}/>

function Auth({onLogin}) {
  const [tab,setTab]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const handle=async()=>{
    if(!email){return;}
    setLoading(true);
    await sleep(1000);
    setLoading(false);
    onLogin({email,plan:"pro"});
  };
  return (
    <div className="auth-wrap">
      <div className="bgrid"/><div className="bg1"/><div className="bg2"/>
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:28}}>
          <span className="auth-logo-main">TradeX Quantum AI</span>
          <span className="auth-logo-sub">Institutional Grade Intelligence</span>
        </div>
        <div style={{display:"flex",gap:7,marginBottom:22}}>
          {["login","signup"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px",border:`1px solid ${tab===t?"var(--accent)":"var(--border)"}`,borderRadius:9,background:tab===t?"rgba(0,163,255,.12)":"transparent",color:tab===t?"var(--accent)":"var(--muted)",cursor:"pointer",fontFamily:"var(--font)",fontSize:13,fontWeight:600,transition:"all .2s"}}>{t==="login"?"Sign In":"Sign Up"}</button>
          ))}
        </div>
        <input className="auth-inp" type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input className="auth-inp" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/>
        <button className="auth-btn auth-bp" onClick={handle} disabled={loading}>
          {loading?"Authenticating…":tab==="login"?"Sign In →":"Create Account →"}
        </button>
        <div className="auth-div">or</div>

        </div>
      </div>
    </div>
  );
}

function Signals({ crypto, indices }) {
  const [step,       setStep]       = useState("choose"); // "choose" | "view"

  const selectedType  = SIGNAL_TYPES.find(t => t.id === sigType);
  const selectedAsset = ASSET_LIST.find(a => a.id === assetId);

  const buildSignals = useCallback(() => {
    const setups = TYPE_SETUPS[sigType] || SMC_TYPES;
    const all = [
      { sym:"NIFTY",     price:indices.NIFTY?.price    ||22847,  cat:"nifty"     },
      { sym:"BANKNIFTY", price:indices.BANKNIFTY?.price||48320,  cat:"banknifty" },
      { sym:"SENSEX",    price:indices.SENSEX?.price   ||75204,  cat:"nifty"     },
      { sym:"FINNIFTY",  price:indices.FINNIFTY?.price ||21540,  cat:"nifty"     },
      ...Object.entries(crypto).slice(0,5).map(([k,v])=>({ sym:k, price:v.price, cat:"crypto" })),
      { sym:"EURUSD",    price:1.0824,                            cat:"forex"     },
      { sym:"GBPUSD",    price:1.2764,                            cat:"forex"     },
      { sym:"XAUUSD",    price:indices.GOLD?.price||2341.8,       cat:"commo"     },
    ];
    const pool = selectedAsset?.cat ? all.filter(a=>a.cat===selectedAsset.cat) : all;
    return pool.map(a => {
      const bias = Math.random()>0.42?"Bullish":"Bearish";
      const slP  = rnd(0.005,0.012);
      const e    = a.price*(1+rnd(-0.002,0.002));
      const sl   = bias==="Bullish"?e*(1-slP):e*(1+slP);
      const t1   = bias==="Bullish"?e*(1+slP*1.5):e*(1-slP*1.5);
      const t2   = bias==="Bullish"?e*(1+slP*2.8):e*(1-slP*2.8);
      const t3   = bias==="Bullish"?e*(1+slP*4.2):e*(1-slP*4.2);
      const conf = Math.floor(rnd(65,97));
      const dec  = a.price>=1000?2:a.price>=10?3:5;
      return {
        sym:a.sym, price:a.price, cat:a.cat, bias,
        setup:setups[Math.floor(rnd(0,setups.length))],
        entry:e.toFixed(dec), sl:sl.toFixed(dec),
        t1:t1.toFixed(dec), t2:t2.toFixed(dec), t3:t3.toFixed(dec),
        conf, prob:Math.floor(conf*0.91),
        rr:(Math.abs(t2-e)/Math.abs(sl-e)).toFixed(1)+":1",
        time:nowT(),
      };
    });
  }, [crypto, indices, sigType, selectedAsset]);

  const generate = async () => {
    setGenerating(true);
    await sleep(900);
    setSigs(buildSignals());
    setStep("view");
    setGenerating(false);

function SMCPage({crypto,indices}) {
  const [zones,setZones]=useState([]);
  useEffect(()=>{
    const assets=[
      ...Object.entries(indices).slice(0,4).map(([k,v])=>({sym:k,price:v.price})),
      ...Object.entries(crypto).slice(0,5).map(([k,v])=>({sym:k,price:v.price})),
    ];
    const build=()=>assets.map(a=>{
      const type=SMC_TYPES[Math.floor(rnd(0,SMC_TYPES.length))];
      const bias=Math.random()>0.45?"Bullish":"Bearish";
      const dec=a.price>=1000?0:4;
      return{type,sym:a.sym,zone:`${(a.price*.997).toFixed(dec)} – ${(a.price*1.002).toFixed(dec)}`,bias,strength:["High","Strong","Medium","Weak"][Math.floor(rnd(0,4))],updated:nowT()};
    });
    setZones(build());
    const iv=setInterval(()=>setZones(prev=>prev.map(z=>({...z,updated:nowT()}))),12000);
    return()=>clearInterval(iv);
  },[crypto,indices]);
  const TC={FVG:"var(--accent)",IFVG:"var(--purple)","Order Block":"var(--gold)","BOS Retest":"var(--green)",CHOCH:"var(--red)",MSS:"var(--gold)",BSL:"var(--green)",SSL:"var(--red)","Breaker Block":"#FF6B35","Mitigation Block":"var(--purple)","Liquidity Sweep":"#FF6B35"};
  return (

  const t = (title+" "+desc).toUpperCase();
  if (HIGH_KEYWORDS.some(k=>t.includes(k.toUpperCase()))) return "HIGH";
  if (MED_KEYWORDS.some(k=>t.includes(k.toUpperCase()))) return "MED";

  const t = title+" "+desc;
  for (const [asset, words] of Object.entries(ASSET_KEYWORDS)) {
    if (words.some(w=>t.toLowerCase().includes(w.toLowerCase()))) return asset;
  }
  return "MARKET";
};

  if (diff < 1) return "just now";
  if (diff < 60) return `${diff}m ago`;
  const h = Math.floor(diff/60);
  if (h < 24) return `${h}h ago`;

};

                    <div style={{fontSize:12,color:"var(--text2)",lineHeight:1.7,marginBottom:14}}>{art.description}</div>

    items.push({sym:"SILVER",     price:"$27.84",   chg:0.62, cat:"commo",    live:false});
    return items;
  };
  const tickerItems = buildTicker();
  const doubled = [...tickerItems, ...tickerItems]; // duplicate for seamless loop

  if(!user) return <><style>{CSS}</style><div className="bgrid"/><div className="bg1"/><div className="bg2"/><Auth onLogin={setUser}/></>;

  const p={crypto,forex,indices,fg,status,user};
  const renderPage=()=>{
    switch(page){
      case "dashboard": return <Dashboard {...p}/>;
      case "chart":     return <ChartPage/>;
      case "signals":   return <Signals {...p}/>;
      case "smc":       return <SMCPage {...p}/>;
      case "options":   return <OptionsPage {...p}/>;
      case "forex":     return <ForexPage {...p}/>;
      case "crypto":    return <CryptoCtr {...p}/>;
      case "watchlist": return <WatchlistPage {...p}/>;
      case "journal":   return <JournalPage/>;
      case "analytics": return <Analytics/>;
      case "risk":      return <RiskPage/>;
      case "news":      return <NewsPage {...p}/>;
      case "ai":        return <AIChat {...p}/>;
      default:          return <Dashboard {...p}/>;
    }
  };

  return (
    <>
      <style>{CSS}</style>
      <div className="bgrid"/><div className="bg1"/><div className="bg2"/>

      {/* Toast alerts */}
      <div className="toast-wrap">
        {alerts.map(a=>(
          <div className="toast" key={a.id}>
            <span style={{fontSize:16}}>{a.icon}</span>
            <span style={{fontSize:12,color:"var(--text)"}}>{a.msg}</span>
          </div>
        ))}
      </div>

      {/* ── SANDBOX / DEPLOY NOTICE ── */}
      {status.binance !== "live" && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:"rgba(255,184,0,.1)",borderTop:"1px solid rgba(255,184,0,.25)",padding:"7px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11,backdropFilter:"blur(10px)"}}>
          <span style={{color:"var(--gold)"}}>
            ⚡ <strong>Claude.ai Preview Mode</strong> — WebSocket/CORS restricted here.
            Deploy on <strong>Vercel</strong> for 100% live data (Binance + NewsAPI).
            Abhi: Binance REST polling active.
          </span>
          <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--muted)"}}>Status: {status.binance}</span>
        </div>
      )}

      <div className="app">
        {/* SIDEBAR */}
        <nav className="sidebar">
          <div className="logo-w" onClick={()=>setPage("dashboard")}>
            <div className="logo-tx">TQ</div>
            <div className="logo-sx">QUANTUM</div>
          </div>
          <div className="nav-lst">
            {NAV.map(n=>(
              <div key={n.id} className={`nb ${page===n.id?"on":""}`} onClick={()=>setPage(n.id)}>
                <div className="nb-ic">{n.icon}</div>
                <div className="nb-lb">{n.short}</div>
                <div className="nb-tip">{n.label}</div>
              </div>
            ))}
          </div>
          <div className="sb-bot">
            <div className="ava" onClick={()=>setUser(null)} title="Logout" style={{width:34,height:34,fontSize:12}}>
              {user.email?.[0]?.toUpperCase()||"T"}
            </div>
          </div>
        </nav>

        {/* MAIN */}
        <div className="main">
          {/* ══ MEGA LIVE TICKER BAR ══ */}
          <div className="ticker-bar">
            <div className="ticker-label">⚡ LIVE</div>
            <div className="ticker-scroll">
              <div className="ticker-track">
                {doubled.map((t,i)=>(
                  <div className="ti" key={i} onClick={()=>setPage(t.cat==="crypto"?"crypto":t.cat==="idx"?"dashboard":t.cat==="fx"?"forex":"dashboard")}>
                    {i>0 && i%1===0 && <div className="ti-div"/>}
                    <span className="ti-sym">{t.sym}</span>
                    <span className="ti-p">{t.price}</span>
                    {t.special ? (
                      <span className="ti-c" style={{color:t.specialColor,marginLeft:5}}>{t.special}</span>
                    ) : (
                      <span className="ti-c" style={{color:t.chg>=0?"#00FF88":"#FF4D4D"}}>
                        {t.chg>=0?"+":""}{Number(t.chg).toFixed(2)}%
                      </span>
                    )}
                    {t.live && <span style={{width:4,height:4,borderRadius:"50%",background:"#00FF88",boxShadow:"0 0 4px #00FF88",display:"inline-block",marginLeft:5,flexShrink:0}}/>}
                  </div>
                ))}
              </div>
            </div>
          </div>
          {/* ══ TOPBAR ══ */}
          <div className="topbar">
            <div className="tb-brand" onClick={()=>setPage("dashboard")}>TradeX Quantum AI</div>
            <div className="tb-sep"/>
            {/* ticker moved to bar above */}
            <div style={{flex:1}}/>
            <div className="tb-r">
              <StatusBar status={status}/>
              <div className="srch"><span className="si">🔍</span><input placeholder="Search…"/></div>
              <div className="ava" onClick={()=>setUser(null)} title="Logout">{user.email?.[0]?.toUpperCase()||"T"}</div>
            </div>
          </div>
          <div className="page" key={page}>{renderPage()}</div>
        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
